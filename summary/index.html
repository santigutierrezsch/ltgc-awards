<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LTGC Award Show Summary</title>
  <link rel="stylesheet" href="summary.css" />
</head>
<body>
  <main class="summary-page">
    <header class="summary-hero">
      <p class="eyebrow">LTGC Award Show</p>
      <h1>Summary</h1>
      <p class="summary-copy">A full recap of every award and everybody&apos;s most known-for tags on one page.</p>
    </header>

    <section class="summary-section">
      <div class="section-heading">
        <p class="eyebrow">Awards</p>
        <h2>Full Award Recap</h2>
      </div>
      <div class="table-shell">
        <table class="summary-table">
          <thead>
            <tr>
              <th scope="col">#</th>
              <th scope="col">Question</th>
              <th scope="col">Winner</th>
            </tr>
          </thead>
          <tbody id="awards-table-body"></tbody>
        </table>
      </div>
    </section>

    <section class="summary-section">
      <div class="section-heading">
        <p class="eyebrow">Most Known For</p>
        <h2>People Recap</h2>
      </div>
      <div class="table-shell">
        <table class="summary-table">
          <thead>
            <tr>
              <th scope="col">Name</th>
              <th scope="col">Known For</th>
            </tr>
          </thead>
          <tbody id="known-for-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="summary.js"></script>
</body>
</html>
